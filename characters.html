<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>人物 (Characters)</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC&family=Bonheur+Royale&display=swap" rel="stylesheet">

<style>

body{
    background:
    linear-gradient(rgba(10,10,15,0.65),rgba(10,10,15,0.65)),
    url("images/main-background.webp");

    background-size:cover;
    background-position:center;
    background-attachment:fixed;

    color:#e6e6e6;
    font-family:"Noto Serif SC",serif;
    margin:40px;
    line-height:1.7;
}

/* 顶部导航 */

.topnav{
    max-width:900px;
    margin:0 auto 30px auto;
    text-align:center;
}

.topnav a{
    display:inline-block;
    margin:0 10px;
    padding:10px 22px;
    color:#e6e6e6;
    text-decoration:none;
    background:rgba(255,255,255,0.08);
    border-radius:999px;

    backdrop-filter:blur(6px);
    -webkit-backdrop-filter:blur(6px);
}

.topnav a.active{
    background:rgba(255,255,255,0.16);
}

/* 标题 */

h1{
    font-size:44px;
    text-align:center;
    margin-bottom:10px;
}

/* 副标题 */

.subtitle{
    text-align:center;
    color:#aaa;
    margin-bottom:60px;
    font-family:"Bonheur Royale",cursive;
    font-size:40px;
}

/* 内容区域 */

.section{
    max-width:900px;
    margin:auto;

    background:rgba(15,15,20,0.65);
    padding:50px;

    border-radius:14px;

    backdrop-filter:blur(8px);
    -webkit-backdrop-filter:blur(8px);

    box-shadow:0 0 25px rgba(0,0,0,0.4);
}

h2{
    border-bottom:1px solid #444;
    padding-bottom:6px;
    margin-top:0;
}

/* 人物导航 */

.char-nav{
    display:grid;
    grid-template-columns:repeat(2, minmax(0, 1fr));
    gap:18px;
    margin-top:30px;
}

.char-nav a{
    display:block;
    padding:18px 22px;
    text-decoration:none;
    color:#e6e6e6;

    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.12);
    border-radius:14px;

    backdrop-filter:blur(6px);
    -webkit-backdrop-filter:blur(6px);

    transition:0.2s ease;
    font-size:18px;
    letter-spacing:1px;
}

.char-nav a:hover{
    background:rgba(255,255,255,0.12);
    border-color:rgba(255,255,255,0.22);
    transform:translateY(-2px);
}

/* footer */

.footer{
    margin-top:80px;
    text-align:center;
    color:#777;
    font-size:14px;
}

</style>
</head>

<body>

<!-- 主导航 -->

<div class="topnav">
    <a href="index.html">首页</a>
    <a href="characters.html" class="active">人物</a>
</div>

<h1>人物</h1>

<p class="subtitle">

</p>

</div>

</div>

<div class="footer">

</div>

</body>

</html>
